<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furkan Ertürk | Software Developer Portfolio</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151f32;
            --bg-darker: #070a12;
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8, #6366f1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #22314d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header / Navbar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Hero Section */
        .hero {
            padding: 160px 0 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at 50% 30%, rgba(56, 189, 248, 0.08), transparent 60%);
        }

        .hero-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .hero h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 35px;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(56, 189, 248, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--text-muted);
        }

        /* Sections General */
        section {
            padding: 90px 0;
            border-bottom: 1px solid rgba(34, 49, 77, 0.4);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 45px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 40px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* About Section */
        .about-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .info-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .info-card:hover {
            transform: translateY(-4px);
        }

        .info-card h4 {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .info-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Tech Stack Section */
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .tech-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .tech-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: linear-gradient(to bottom, var(--bg-card), rgba(56, 189, 248, 0.03));
        }

        .tech-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .tech-item span {
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* Projects Section */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .project-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 30px rgba(7, 10, 18, 0.5);
        }

        .project-cover {
            height: 180px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .project-cover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
        }

        .project-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .project-tag {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .project-links {
            display: flex;
            gap: 15px;
        }

        .project-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-link:hover {
            text-decoration: underline;
        }

        /* Timeline Section */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 5px;
            width: 2px;
            height: 100%;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 45px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -35px;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-main);
            border: 3px solid var(--accent);
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .timeline-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Geek Zone & Spotify Widget */
        .geek-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 40px;
        }

        .geek-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
        }

        .geek-post {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .geek-post:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .geek-post-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .geek-post-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Spotify Widget Panel */
        .spotify-panel {
            background: linear-gradient(180deg, #1db954 0%, #0b0f19 100%);
            border-radius: 16px;
            padding: 2px;
        }

        .spotify-inner {
            background: #070a12;
            border-radius: 14px;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .spotify-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1db954;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vinyl-disc {
            width: 140px;
            height: 140px;
            background: #111;
            border-radius: 50%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
            background-image: radial-gradient(circle, #333 10%, transparent 11%, transparent 20%, #222 21%, #222 30%, transparent 31%);
            animation: spin 8s linear infinite;
        }

        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            border: 4px solid #000;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .track-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .artist-name {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .player-controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar {
            height: 4px;
            background: #222;
            border-radius: 2px;
            width: 100%;
            position: relative;
        }

        .progress-current {
            height: 100%;
            background: #1db954;
            width: 65%;
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Contact Footer Section */
        footer {
            background-color: var(--bg-darker);
            padding: 60px 0 30px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .social-icon {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            background: var(--bg-card);
        }

        .social-icon:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .footer-copy {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.4rem; }
            .about-grid, .geek-grid { grid-template-columns: 1fr; }
            nav ul { display: none; } /* Standard simplify for raw template */
            .info-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="container nav-container">
            <a href="#" class="logo">furkan.dev</a>
        </div>
    </header>

    

</body>
</html>
